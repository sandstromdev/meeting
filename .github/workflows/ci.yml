name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Parity with `.env.schema` (placeholders only)
      PUBLIC_SITE_URL: https://ci.example
      PUBLIC_CONVEX_URL: https://ci.convex.example
      PUBLIC_CONVEX_SITE_URL: https://ci.convex.example
      PUBLIC_ENABLE_SIGNUP: 'true'
      ENVIRONMENT: test
      TRUSTED_ORIGINS: https://ci.example
      VERCEL_URL: ci-placeholder.vercel.app
      VERCEL_PROJECT_PRODUCTION_URL: ci.example
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Varlock schema validation
        run: bun run env:validate

      - name: Lint
        run: bun run lint

      - name: Type and Svelte check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build (Vercel parity)
        run: bun run build
